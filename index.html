//  VIETNAMESE LUNAR CALENDAR ENGINE
// ═══════════════════════════════════════════
const TZ = 7; // Vietnam UTC+7

function jdFromDate(d,m,y){
  const a=Math.floor((14-m)/12),yr=y+4800-a,mo=m+12*a-3;
  let jd=d+Math.floor((153*mo+2)/5)+365*yr+Math.floor(yr/4)-Math.floor(yr/100)+Math.floor(yr/400)-32045;
  if(jd<2299161) jd=d+Math.floor((153*mo+2)/5)+365*yr+Math.floor(yr/4)-32083;
  return jd;
}
function jdToDate(jd){
  let a,b,c;
  if(jd>2299160){a=jd+32044;b=Math.floor((4*a+3)/146097);c=a-Math.floor(146097*b/4);}
  else{b=0;c=jd+32082;}
  const d=Math.floor((4*c+3)/1461),e=c-Math.floor(1461*d/4),mo=Math.floor((5*e+2)/153);
  return[e-Math.floor((153*mo+2)/5)+1,mo+3-12*Math.floor(mo/10),100*b+d-4800+Math.floor(mo/10)];
}
function getNewMoonDay(k){
  const dr=Math.PI/180,T=k/1236.85,T2=T*T,T3=T2*T;
  let jd=2415020.75933+29.53058868*k+0.0001178*T2-0.000000155*T3;
  jd+=0.00033*Math.sin((166.56+132.87*T-0.009173*T2)*dr);
  const M=(359.2242+29.10535608*k-0.0000333*T2-0.00000347*T3)*dr;
  const Mpr=(306.0253+385.81691806*k+0.0107306*T2+0.00001236*T3)*dr;
  const F=(21.2964+390.67050646*k-0.0016528*T2-0.00000239*T3)*dr;
  let C=(0.1734-0.000393*T)*Math.sin(M)+0.0021*Math.sin(2*M);
  C-=0.4068*Math.sin(Mpr)+0.0161*Math.sin(2*Mpr)-0.0004*Math.sin(3*Mpr);
  C+=0.0104*Math.sin(2*F)-0.0051*Math.sin(M+Mpr)-0.0074*Math.sin(M-Mpr);
  C+=0.0004*Math.sin(2*F+M)-0.0004*Math.sin(2*F-M)-0.0006*Math.sin(2*F+Mpr);
  C+=0.001*Math.sin(2*F-Mpr)+0.0005*Math.sin(M+2*Mpr);
  const dt=T<-11?0.001+0.000839*T+0.0002261*T2-0.00000845*T3:-0.000278+0.000265*T+0.000262*T2;
  return Math.floor(jd+C-dt+0.5+TZ/24);
}
function getSunLong(jd){
  const dr=Math.PI/180,T=(jd-2451545)/36525,T2=T*T;
  let M=357.5291+35999.0503*T-0.0001559*T2,L=280.46646+36000.76983*T+0.0003032*T2;
  M*=dr;
  let C=(1.9146-0.004817*T-0.000014*T2)*Math.sin(M)+(0.019993-0.000101*T)*Math.sin(2*M)+0.00029*Math.sin(3*M);
  L=(L+C)%360;
  return Math.floor(L/30);
}
function getLM11(y){
  const off=jdFromDate(31,12,y)-2415021;
  let k=Math.floor(off/29.530588853),nm=getNewMoonDay(k);
  if(getSunLong(nm)>=9) nm=getNewMoonDay(k-1);
  return nm;
}
function isLeapYear(k){
  const nm0=getNewMoonDay(k),nm2=getNewMoonDay(k+2);
  return Math.floor(nm2-nm0)>=60&&getSunLong(getNewMoonDay(k+1))===getSunLong(nm0);
}

function solarToLunar(d,m,y){
  const jd=jdFromDate(d,m,y);
  let k=Math.floor((jd-2415021)/29.530588853);
  let nm=getNewMoonDay(k);
  if(nm>jd) nm=getNewMoonDay(k-1);
  // find month 11
  let a11=getLM11(y-(m<11&&getSunLong(nm)>=9?1:0));
  let b11=getLM11(y+(m===11&&getSunLong(nm)<9?1:0));
  // determine lunar month number
  let monthStart=nm;
  let lunarMonth=Math.round((monthStart-a11)/29.530588853)+11;
  let leapYear=false;
  // check leap
  let off=Math.round((a11-getLM11(y-1))/29.530588853);
  if(off===13){
    // there's a leap month
    const leapMo=findLeapMonth(getLM11(y-1),y);
    if(lunarMonth>=leapMo) lunarMonth--;
    leapYear=true;
  }
  lunarMonth=((lunarMonth-1)%12)+1;
  if(lunarMonth<=0) lunarMonth+=12;
  return{day:jd-nm+1,month:lunarMonth,year:y-(lunarMonth>10&&m<4?1:0)+(lunarMonth<4&&m>10?1:0)};
}

// Simpler reliable approach
function solar2Lunar(dd,mm,yy){
  const jd=jdFromDate(dd,mm,yy);
  let k=Math.floor((jd-2415021.076998695)/29.530588853);
  let monthStart=getNewMoonDay(k);
  if(monthStart>jd) monthStart=getNewMoonDay(k-1);
  const lunarDay=jd-monthStart+1;
  // Find lunar year's month 11
  let a11=getLM11(yy), b11=getLM11(yy+1);
  if(a11>jd) a11=getLM11(yy-1), b11=getLM11(yy);
  const lunarYear=a11<2299161?yy:yy;
  let lunarMonth=Math.round((monthStart-a11)/29.530588853)+11;
  if(b11-a11>365){
    const leapStart=getLM11(yy-1);
    let lm=Math.round((a11-leapStart)/29.530588853)+11;
    if(lm===0) lm=11;
  }
  lunarMonth=((lunarMonth-1)%12)+1;
  let lunarYr=yy;
  if(mm<4&&lunarMonth>9) lunarYr=yy-1;
  if(mm>9&&lunarMonth<4) lunarYr=yy+1;
  return{d:lunarDay,m:lunarMonth,y:lunarYr};
}

      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>

        <div style={{textAlign:'center'}}>
          <div style={{fontFamily:'Cinzel',color:'#D4AF37',fontSize:16,fontWeight:700}}>{MONTHS[viewDate.m]}</div>

        </div>
        <button onClick={nextMonth} style={{background:'rgba(255,255,255,.07)',border:'1px solid rgba(255,255,255,.12)',color:'#D4AF37',width:36,height:36,borderRadius:9,cursor:'pointer',fontSize:16}}>›</button>
      </div>

      {/* Weekday headers */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2,marginBottom:4}}>
        {WDAYS.map((d,i)=><div key={d} style={{textAlign:'center',fontSize:10,color:i===0?'#FF6B6B':i===6?'#4D96FF':'#777',padding:'4px 0',fontFamily:'Cinzel'}}>{d}</div>)}
      </div>

      {/* Calendar grid */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2,marginBottom:14}}>
        {cells.map((d,i)=>{
          if(!d) return<div key={i}/>;
          const info=getDayInfo(d);
          const isToday=d===today.getDate()&&viewDate.m===today.getMonth()&&viewDate.y===today.getFullYear();
          const isSel=d===selected;
          const dow=i%7;
          return(
            <div key={i} onClick={()=>setSelected(d===selected?null:d)} style={{
              background:isSel?'rgba(212,175,55,.25)':isToday?'rgba(212,175,55,.12)':'rgba(255,255,255,.03)',
              border:`1px solid ${isSel?'rgba(212,175,55,.6)':isToday?'rgba(212,175,55,.3)':'rgba(255,255,255,.07)'}`,
              borderRadius:9,padding:'5px 2px',textAlign:'center',cursor:'pointer',minHeight:52

              <div style={{fontSize:14,fontWeight:isToday?700:400,color:dow===0?'#FF6B6B':dow===6?'#4D96FF':'#ddd'}}>{d}</div>

              <div style={{fontSize:8,color:info.sao.t?'#6BCB77':'#FF6B6B',lineHeight:1,marginTop:1}}>{info.sao.n}</div>

        })}

      {/* Selected day detail */}
      {selInfo&&(
        <div style={{animation:'fadeInUp .3s ease'}}>
          <div style={{background:'linear-gradient(135deg,rgba(212,175,55,.15),rgba(162,155,254,.07))',border:'1px solid rgba(212,175,55,.3)',borderRadius:16,padding:16,marginBottom:12}}>

                <div style={{color:'#aaa',fontSize:12,marginTop:2}}>Âm: {selInfo.lunar.d} tháng {selInfo.lunar.m} năm {getYearChi(selInfo.lunar.y)}</div>
                <div style={{color:'#A29BFE',fontSize:12,marginTop:2}}>Can Chi: {selInfo.dayCC}</div>
              </div>
              <div style={{background:selInfo.sao.t?'rgba(107,203,119,.2)':'rgba(255,107,107,.2)',border:`1px solid ${selInfo.sao.t?'#6BCB77':'#FF6B6B'}44`,borderRadius:12,padding:'8px 14px',textAlign:'center'}}>
                <div style={{color:selInfo.sao.t?'#6BCB77':'#FF6B6B',fontFamily:'Cinzel',fontSize:15,fontWeight:700}}>{selInfo.sao.n}</div>
                <div style={{color:selInfo.sao.t?'#6BCB77':'#FF6B6B',fontSize:10,marginTop:1}}>{selInfo.sao.t?'HOÀNG ĐẠO':'HẮC ĐẠO'}</div>
              </div>
            </div>
            <div style={{background:'rgba(0,0,0,.2)',borderRadius:10,padding:10,marginBottom:10}}>
              <div style={{color:'#D4AF37',fontSize:11,fontFamily:'Cinzel',marginBottom:4}}>📋 Lời khuyên ngày này</div>
              <div style={{color:'#bbb',fontSize:12,lineHeight:1.7}}>{selInfo.sao.m}</div>
            </div>
            {/* Giờ hoàng đạo */}
            <div>
              <div style={{color:'#D4AF37',fontSize:11,fontFamily:'Cinzel',marginBottom:7}}>⏰ Giờ Hoàng Đạo</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
                {GIO_LIST.map((g,i)=>{
                  const isHD=selInfo.hdGio.includes(g);
                  return(
                    <div key={g} style={{background:isHD?'rgba(107,203,119,.2)':'rgba(255,255,255,.04)',border:`1px solid ${isHD?'rgba(107,203,119,.4)':'rgba(255,255,255,.08)'}`,borderRadius:7,padding:'4px 8px',textAlign:'center',minWidth:55}}>
                      <div style={{color:isHD?'#6BCB77':'#666',fontSize:10,fontWeight:isHD?700:400}}>{g}</div>
                      <div style={{color:isHD?'#6BCB77':'#555',fontSize:8,marginTop:1}}>{GIO_TIME[i]}</div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>

          {/* Việc nên làm / tránh */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <div style={{background:'rgba(107,203,119,.08)',border:'1px solid rgba(107,203,119,.2)',borderRadius:12,padding:12}}>
              <div style={{color:'#6BCB77',fontFamily:'Cinzel',fontSize:11,marginBottom:7}}>✅ NÊN LÀM</div>
              {selInfo.sao.t?[
                'Ký kết hợp đồng','Khởi công xây dựng','Kết hôn, đính hôn','Khai trương cửa hàng','Xuất hành đi xa','Di chuyển, dọn nhà'
              ].slice(0,4).map(v=><div key={v} style={{color:'#aaa',fontSize:10,marginBottom:2}}>• {v}</div>):[
                'Sửa chữa nhỏ','Nghỉ ngơi dưỡng bệnh','Thiền định, cầu nguyện'
              ].map(v=><div key={v} style={{color:'#aaa',fontSize:10,marginBottom:2}}>• {v}</div>)}
            </div>
            <div style={{background:'rgba(255,107,107,.08)',border:'1px solid rgba(255,107,107,.2)',borderRadius:12,padding:12}}>
              <div style={{color:'#FF6B6B',fontFamily:'Cinzel',fontSize:11,marginBottom:7}}>❌ TRÁNH</div>
              {!selInfo.sao.t?[
                'Ký kết hợp đồng','Khai trương','Xuất hành xa','Kết hôn','Khởi công xây dựng'
              ].slice(0,4).map(v=><div key={v} style={{color:'#aaa',fontSize:10,marginBottom:2}}>• {v}</div>):[

      {!selected&&<div style={{textAlign:'center',color:'#555',fontSize:12,marginTop:8}}>👆 Nhấn vào ngày để xem chi tiết</div>}
    </div>
  );
}

// ═══════════════════════════════════════════
//  TAB: PHONG THỦY
// ═══════════════════════════════════════════
function PhongThuyTab(){
  const [mode,setMode]=useState('cung');
  const [birthY,setBirthY]=useState('');
  const [gender,setGender]=useState('male');
  const [cungRes,setCungRes]=useState(null);
  const [nhRes,setNhRes]=useState(null);
  const [nhDir,setNhDir]=useState('');

  const calcCung=()=>{
    if(!birthY) return;
    const y=parseInt(birthY);
    // Tính cung phi theo giới tính
    let n;
    if(gender==='male'){
      n=(11-(y%9))%9; if(n===0) n=9;
    } else {
      n=(y%9)+4; if(n>9) n-=9; if(n===0) n=9; if(n>9) n=n%9||9;
    }
    const cp=CUNG_PHI[(n-1+9)%9];
    const yearEl=getCanElement(CAN.indexOf(getYearCan(y)));
    const yearCC=getYearCC(y);
    setCungRes({n,cp,yearEl,yearCC,y,gender});
  };

  const HUONGS=['Bắc','Đông Bắc','Đông','Đông Nam','Nam','Tây Nam','Tây','Tây Bắc'];

  const calcNh=()=>{
    if(!nhDir) return;
    setNhRes({dir:nhDir});
  };

  const NhInfo={
    'Bắc':{el:'Thủy',good:['Đen','Xanh đen'],luc:'Học hành, sự nghiệp, trí tuệ',pt:'Đặt bể cá, thác nước nhỏ'},
    'Đông Bắc':{el:'Thổ',good:['Vàng','Nâu'],luc:'Học tập, tích lũy của cải',pt:'Đặt đá, tinh thể quartz'},
    'Đông':{el:'Mộc',good:['Xanh lá'],luc:'Sức khỏe, gia đình, phát triển',pt:'Cây xanh, tranh rừng'},
    'Đông Nam':{el:'Mộc',good:['Xanh lá','Tím'],luc:'Tài lộc, may mắn',pt:'Cây tài lộc, phong lan'},
    'Nam':{el:'Hỏa',good:['Đỏ','Cam','Tím'],luc:'Danh tiếng, nổi tiếng',pt:'Đèn, nến, tranh rực rỡ'},
    'Tây Nam':{el:'Thổ',good:['Vàng','Hồng'],luc:'Hôn nhân, tình yêu, gia đình',pt:'Đá hồng ngọc, hoa hồng'},
    'Tây':{el:'Kim',good:['Trắng','Bạc'],luc:'Sáng tạo, con cái',pt:'Kim loại, chuông gió bạc'},
    'Tây Bắc':{el:'Kim',good:['Trắng','Xám','Vàng'],luc:'Du lịch, trợ giúp, cha',pt:'Đồng hồ kim loại, cầu vàng'},
  };

  return(
    <div style={{padding:'14px 14px 90px'}}>
      <h2 style={{fontFamily:'Cinzel',color:'#FDCB6E',fontSize:16,marginBottom:14,textAlign:'center'}}>🏠 Phong Thủy</h2>
      <div style={{display:'flex',gap:7,marginBottom:16}}>
        {[{k:'cung',l:'Cung Phi Mệnh'},{k:'nha',l:'Phong Thủy Nhà'}].map(m=>(
          <button key={m.k} onClick={()=>{setMode(m.k);setCungRes(null);setNhRes(null);}} style={{flex:1,background:mode===m.k?'rgba(253,203,110,.2)':'rgba(255,255,255,.05)',border:`1px solid ${mode===m.k?'#FDCB6E':'rgba(255,255,255,.1)'}`,borderRadius:10,padding:'9px',color:mode===m.k?'#FDCB6E':'#888',fontFamily:'Cinzel',fontSize:11,cursor:'pointer'}}>{m.l}</button>
        ))}
      </div>

      {mode==='cung'&&(
        <div>
          <div style={{background:'rgba(255,255,255,.04)',borderRadius:16,padding:14,marginBottom:14}}>
            <Inp label="NĂM SINH" value={birthY} onChange={setBirthY} placeholder="1990"/>
            <div style={{marginBottom:12}}>
              <div style={{color:'#777',fontSize:11,marginBottom:6}}>GIỚI TÍNH</div>
              <div style={{display:'flex',gap:8}}>
                {[{k:'male',l:'👨 Nam'},{k:'female',l:'👩 Nữ'}].map(g=>(
                  <button key={g.k} onClick={()=>setGender(g.k)} style={{flex:1,background:gender===g.k?'rgba(253,203,110,.2)':'rgba(255,255,255,.05)',border:`1px solid ${gender===g.k?'#FDCB6E':'rgba(255,255,255,.1)'}`,borderRadius:9,padding:9,color:gender===g.k?'#FDCB6E':'#888',fontSize:12,cursor:'pointer'}}>{g.l}</button>
                ))}
              </div>
            </div>
            <Btn label="🔮 XEM CUNG PHI MỆNH" onClick={calcCung} color="#FDCB6E" full/>
          </div>
          {cungRes&&(
            <div style={{animation:'fadeInUp .4s ease'}}>
              <div style={{background:'linear-gradient(135deg,rgba(253,203,110,.15),rgba(253,203,110,.05))',border:'1px solid rgba(253,203,110,.3)',borderRadius:18,padding:20,textAlign:'center',marginBottom:14}}>
                <div style={{fontSize:48,marginBottom:4}}>{cungRes.cp.e}</div>
                <div style={{fontFamily:'Cinzel',color:'#FDCB6E',fontSize:24,fontWeight:900}}>Cung {cungRes.n} — {cungRes.cp.c}</div>
                <div style={{color:'#aaa',fontSize:12,marginTop:4}}>
                  {cungRes.y} • {cungRes.yearCC} • {cungRes.gender==='male'?'Nam':'Nữ'}
                </div>
              </div>
              {[
                {t:'🧭 Hướng tốt',v:cungRes.cp.hu,col:'#6BCB77'},
                {t:'🌿 Ngũ hành',v:cungRes.cp.el,col:EL_COLOR[cungRes.cp.el]||'#FDCB6E'},
                {t:'🎨 Màu hợp',v:cungRes.cp.mau,col:'#FF9FF3'},
              ].map(it=>(
                <div key={it.t} style={{display:'flex',justifyContent:'space-between',alignItems:'center',background:'rgba(255,255,255,.04)',borderRadius:11,padding:'11px 14px',marginBottom:8}}>
                  <span style={{color:'#888',fontSize:12}}>{it.t}</span>
                  <span style={{color:it.col,fontFamily:'Cinzel',fontSize:13,fontWeight:600}}>{it.v}</span>
                </div>
              ))}
              <Card color="#FDCB6E" style={{marginTop:4}}>
                <div style={{color:'#FDCB6E',fontFamily:'Cinzel',fontSize:11,marginBottom:6}}>✦ Ý nghĩa cung mệnh</div>
                <p style={{color:'#bbb',fontSize:12,lineHeight:1.8}}>{cungRes.cp.tt}</p>
              </Card>
              <div style={{marginTop:12}}>
                <div style={{color:'#FDCB6E',fontFamily:'Cinzel',fontSize:11,marginBottom:8}}>🧭 Hướng bố trí tốt cho bạn</div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                  {CUNG_PHI.slice(0,6).map(cp=>{
                    const isBest=cp.c===cungRes.cp.c;
                    return(
                      <div key={cp.c} style={{background:isBest?'rgba(253,203,110,.2)':'rgba(255,255,255,.04)',border:`1px solid ${isBest?'rgba(253,203,110,.4)':'rgba(255,255,255,.08)'}`,borderRadius:10,padding:'9px 12px',textAlign:'center'}}>
                        <div style={{fontSize:18}}>{cp.e}</div>
                        <div style={{color:isBest?'#FDCB6E':'#888',fontSize:11,fontFamily:'Cinzel'}}>{cp.hu}</div>
                        <div style={{color:'#666',fontSize:10}}>{cp.el}</div>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          )}
        </div>
      )}

      {mode==='nha'&&(
        <div>
          <div style={{background:'rgba(255,255,255,.04)',borderRadius:16,padding:14,marginBottom:14}}>
            <div style={{color:'#777',fontSize:11,marginBottom:8}}>HƯỚNG CỬA CHÍNH / HƯỚNG NHÀ</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:6,marginBottom:12}}>
              {HUONGS.map(h=>(
                <button key={h} onClick={()=>setNhDir(h)} style={{background:nhDir===h?'rgba(253,203,110,.2)':'rgba(255,255,255,.05)',border:`1px solid ${nhDir===h?'#FDCB6E':'rgba(255,255,255,.1)'}`,borderRadius:9,padding:'9px 4px',color:nhDir===h?'#FDCB6E':'#888',fontSize:11,cursor:'pointer',fontFamily:'Cinzel'}}>{h}</button>
              ))}
            </div>
            <Btn label="🏠 PHÂN TÍCH HƯỚNG NHÀ" onClick={calcNh} color="#FDCB6E" full/>
          </div>
          {nhRes&&NhInfo[nhRes.dir]&&(()=>{
            const info=NhInfo[nhRes.dir];
            const elColor=EL_COLOR[info.el]||'#FDCB6E';
            return(
              <div style={{animation:'fadeInUp .4s ease'}}>
                <div style={{background:`linear-gradient(135deg,${elColor}20,${elColor}06)`,border:`1px solid ${elColor}40`,borderRadius:18,padding:20,textAlign:'center',marginBottom:14}}>
                  <div style={{fontSize:40,marginBottom:6}}>{EL_EMOJI[info.el]}</div>
                  <div style={{fontFamily:'Cinzel',color:elColor,fontSize:22,fontWeight:700}}>Hướng {nhRes.dir}</div>
                  <div style={{color:'#aaa',fontSize:12,marginTop:3}}>Ngũ hành: {info.el}</div>
                </div>
                {[
                  {t:'🎨 Màu sắc phù hợp',v:info.good.join(', '),col:'#FF9FF3'},
                  {t:'✨ Vượng về',v:info.luc,col:'#6BCB77'},
                  {t:'🏺 Vật phẩm nên đặt',v:info.pt,col:'#4D96FF'},
                ].map(it=>(
                  <div key={it.t} style={{background:'rgba(255,255,255,.04)',borderRadius:11,padding:'12px 14px',marginBottom:8}}>
                    <div style={{color:it.col,fontFamily:'Cinzel',fontSize:11,marginBottom:4}}>{it.t}</div>
                    <div style={{color:'#bbb',fontSize:12,lineHeight:1.6}}>{it.v}</div>
                  </div>
                ))}
              </div>
            );
          })()}
        </div>
      )}
    </div>
  );
}

//  TAB: HỢP TUỔI (12 CON GIÁP)

function ZodiacTab(){
  const [mode,setMode]=useState('lookup');
  const [birthY1,setBirthY1]=useState('');
  const [birthY2,setBirthY2]=useState('');
  const [res,setRes]=useState(null);
  const [lookupY,setLookupY]=useState('');
  const [lookupRes,setLookupRes]=useState(null);

  const lookup=()=>{
    if(!lookupY) return;
    setLookupRes(getGiap12FromYear(parseInt(lookupY)));
  };

  const calcCompat=()=>{
    if(!birthY1||!birthY2) return;
    const y1=parseInt(birthY1),y2=parseInt(birthY2);
    const z1=getGiap12FromYear(y1),z2=getGiap12FromYear(y2);
    const score=zodiacCompat(y1,y2);
    const cc1=getYearCC(y1),cc2=getYearCC(y2);
    setRes({z1,z2,score,cc1,cc2,y1,y2});
  };

        ))}

                <p style={{color:'#ddd',lineHeight:1.8,fontSize:13}}>{lookupRes.desc}</p>

                  {lookupRes.y.map(y=><span key={y} style={{background:'rgba(225,112,85,.15)',border:'1px solid rgba(225,112,85,.3)',borderRadius:8,padding:'3px 10px',fontSize:11,color:'#E17055'}}>{y}</span>)}
                </div>
              </div>
            </div>
          )}
          {/* Grid 12 con giáp */}
          {!lookupRes&&(
            <div>
              <div style={{color:'#888',fontSize:11,fontFamily:'Cinzel',marginBottom:8,textAlign:'center'}}>12 CON GIÁP</div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8}}>
                {GIAP12.map(g=>(
                  <div key={g.n} style={{background:`linear-gradient(135deg,${g.color}18,${g.color}06)`,border:`1px solid ${g.color}30`,borderRadius:12,padding:'10px 8px',textAlign:'center',cursor:'pointer'}} onClick={()=>{setLookupY(String(g.y[g.y.length-1]));setLookupRes(g);}}>
                    <div style={{fontSize:26,marginBottom:3}}>{g.e}</div>
                    <div style={{fontFamily:'Cinzel',color:g.color,fontSize:11,fontWeight:600}}>{g.n}</div>
                    <div style={{color:'#666',fontSize:9,marginTop:1}}>{g.el}</div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      )}

      {mode==='compat'&&(
        <div>
          <div style={{background:'rgba(255,255,255,.04)',borderRadius:14,padding:14,marginBottom:14}}>
            <div style={{display:'flex',gap:10,alignItems:'center'}}>
              <div style={{flex:1}}>
                <Inp label="NGƯỜI 1 — NĂM SINH" value={birthY1} onChange={setBirthY1} placeholder="1990"/>
              </div>
              <div style={{color:'#E17055',fontSize:22,flexShrink:0,marginTop:8}}>♥</div>
              <div style={{flex:1}}>
                <Inp label="NGƯỜI 2 — NĂM SINH" value={birthY2} onChange={setBirthY2} placeholder="1992"/>
              </div>
            </div>
            <Btn label="💑 KIỂM TRA HỢP TUỔI" onClick={calcCompat} color="#E17055" full textColor="#fff"/>
          </div>
          {res&&(
            <div style={{animation:'fadeInUp .4s ease'}}>
              <div style={{textAlign:'center',marginBottom:18}}>
                <div style={{display:'flex',justifyContent:'center',alignItems:'center',gap:16,marginBottom:12}}>
                  <div style={{textAlign:'center'}}>
                    <div style={{fontSize:40}}>{res.z1.e}</div>
                    <div style={{fontFamily:'Cinzel',color:res.z1.color,fontSize:13}}>{res.z1.n}</div>
                    <div style={{color:'#777',fontSize:10}}>{res.cc1}</div>
                  </div>
                  <div>
                    <div style={{fontFamily:'Cinzel',color:res.score>=70?'#D4AF37':'#aaa',fontSize:50,fontWeight:900,lineHeight:1,textShadow:res.score>=70?'0 0 30px rgba(212,175,55,.5)':'none'}}>{res.score}%</div>
                    <div style={{color:'#888',fontSize:11,textAlign:'center'}}>hợp</div>
                  </div>
                  <div style={{textAlign:'center'}}>
                    <div style={{fontSize:40}}>{res.z2.e}</div>
                    <div style={{fontFamily:'Cinzel',color:res.z2.color,fontSize:13}}>{res.z2.n}</div>
                    <div style={{color:'#777',fontSize:10}}>{res.cc2}</div>
                  </div>
                </div>
                <div style={{color:'#aaa',fontSize:13,lineHeight:1.7,padding:'0 10px'}}>{getMsg(res.score)}</div>
              </div>
              <div style={{background:'rgba(255,255,255,.04)',borderRadius:14,padding:14}}>
                {[
                  {l:'❤️ Tình cảm',s:res.score},
                  {l:'💼 Sự nghiệp chung',s:Math.min(95,res.score+Math.floor(Math.random()*10))},
                  {l:'🏠 Cuộc sống gia đình',s:Math.min(95,res.score+5)},
                ].map(it=>(
                  <div key={it.l} style={{marginBottom:12}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                      <span style={{color:'#aaa',fontSize:12}}>{it.l}</span>
                      <span style={{color:'#D4AF37',fontFamily:'Cinzel',fontWeight:700,fontSize:13}}>{it.s}%</span>
                    </div>
                    <div style={{background:'rgba(255,255,255,.07)',borderRadius:999,height:6,overflow:'hidden'}}>
                      <div style={{height:'100%',width:`${it.s}%`,background:'linear-gradient(90deg,#D4AF37,#D4AF37aa)',borderRadius:999}}/>
                    </div>
                  </div>
                ))}
              </div>
              {res.z1.hh.includes(res.z2.n)&&(
                <div style={{background:'rgba(107,203,119,.1)',border:'1px solid rgba(107,203,119,.3)',borderRadius:12,padding:12,marginTop:10,textAlign:'center'}}>
                  <div style={{color:'#6BCB77',fontFamily:'Cinzel',fontSize:12}}>🌟 THIÊN ĐỊNH HỢP DUYÊN</div>
                  <div style={{color:'#aaa',fontSize:11,marginTop:4}}>{res.z1.n} và {res.z2.n} là cặp tương sinh trong dân gian!</div>
                </div>
              )}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════
//  EXISTING TABS (Analyze, Compat, Special, AI)
// ═══════════════════════════════════════════
function AnalyzeTab(){
  const [name,setName]=useState('');const[dob,setDob]=useState('');const[res,setRes]=useState(null);const[det,setDet]=useState(null);
  const calc=()=>{if(!name||!dob)return;const d=dob.replace(/\//g,'');setRes({lp:getLP(d),exp:getExp(name),soul:getSoul(name),pers:getPerso(name),att:getAtt(d),py26:getPY(d,2026),py27:getPY(d,2027)});};
  const NRow=({num,label})=>{const d=N[num]||N[1];return(<div onClick={()=>setDet({num,label})} style={{background:`linear-gradient(135deg,${d.c}16,${d.c}05)`,border:`1px solid ${d.c}30`,borderRadius:13,padding:'12px 13px',marginBottom:9,cursor:'pointer',display:'flex',alignItems:'center',gap:11,animation:'fadeInUp .4s ease'}}>
    <div style={{width:46,height:46,borderRadius:'50%',background:`${d.c}18`,border:`2px solid ${d.c}50`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:19,flexShrink:0,position:'relative'}}>{d.e}<div style={{position:'absolute',top:-4,right:-4,width:19,height:19,borderRadius:'50%',background:d.c,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'Cinzel',fontWeight:900,fontSize:9,color:'#000'}}>{num}</div></div>
    <div style={{flex:1}}><div style={{color:'#666',fontSize:10,marginBottom:1}}>{label}</div><div style={{fontFamily:'Cinzel',color:d.c,fontSize:13,fontWeight:600}}>{d.n}</div><div style={{color:'#777',fontSize:10}}>{d.s}</div></div>
    <div style={{color:'#444',fontSize:16}}>›</div>
  </div>);};
  return(<div style={{padding:'14px 14px 90px'}}>
    {det&&<DetailModal num={det.num} type={det.label} onClose={()=>setDet(null)}/>}
    <h2 style={{fontFamily:'Cinzel',color:'#D4AF37',fontSize:16,marginBottom:14,textAlign:'center'}}>✦ Phân Tích Thần Số ✦</h2>
    <div style={{background:'rgba(255,255,255,.04)',borderRadius:14,padding:14,marginBottom:12}}>
      <Inp label="HỌ VÀ TÊN ĐẦY ĐỦ" value={name} onChange={setName} placeholder="Nguyễn Văn An"/>
      <Inp label="NGÀY SINH (DD/MM/YYYY)" value={dob} onChange={setDob} placeholder="01/01/1990"/>
      <Btn label="🔮 KHÁM PHÁ VẬN MỆNH" onClick={calc} full/>
    </div>
    {res&&(<div>
      <div style={{textAlign:'center',marginBottom:12,padding:12,background:'rgba(212,175,55,.08)',borderRadius:12,border:'1px solid rgba(212,175,55,.2)'}}><div style={{fontFamily:'Cinzel',color:'#D4AF37',fontSize:14}}>{name}</div><div style={{color:'#666',fontSize:12,marginTop:2}}>{dob}</div></div>
      {[{num:res.lp,label:'SỐ CHỦ ĐẠO'},{num:res.exp,label:'SỐ TÊN'},{num:res.soul,label:'SỐ LINH HỒN'},{num:res.pers,label:'SỐ NHÂN CÁCH'},{num:res.att,label:'SỐ THÁI ĐỘ'}].map(it=><NRow key={it.label} {...it}/>)}
      <div style={{background:'rgba(253,203,110,.08)',border:'1px solid rgba(253,203,110,.22)',borderRadius:14,padding:13,marginBottom:8}}>
        <div style={{color:'#FDCB6E',fontFamily:'Cinzel',fontSize:11,marginBottom:9}}>📅 VẬN HẠN CÁ NHÂN</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:9}}>
          {[{yr:2026,num:res.py26},{yr:2027,num:res.py27}].map(({yr,num})=>{const d=N[num]||N[1];return(<div key={yr} style={{background:'rgba(0,0,0,.3)',borderRadius:11,padding:11,textAlign:'center'}}><div style={{color:'#555',fontSize:10,marginBottom:3}}>NĂM {yr}</div><div style={{fontFamily:'Cinzel',color:d.c,fontSize:26,fontWeight:900}}>{num}</div><div style={{color:'#777',fontSize:10,marginTop:3,lineHeight:1.4}}>{YR[num]||''}</div></div>);})}
        </div>
      </div>
      <div style={{textAlign:'center',color:'#555',fontSize:11}}>👆 Nhấn vào từng số để xem chi tiết</div>
    </div>)}
  </div>);
}

function AITab(){
  const [msgs,setMsgs]=useState([{r:'a',t:'✨ Xin chào! Tôi là chuyên gia về Thần Số Học, Lịch Vạn Sự và Phong Thủy. Hỏi tôi bất cứ điều gì bạn muốn biết!'}]);
  const [inp,setInp]=useState('');const[loading,setLoading]=useState(false);const bot=useRef(null);
  useEffect(()=>{bot.current?.scrollIntoView({behavior:'smooth'})},[msgs,loading]);
  const send=async()=>{
    if(!inp.trim()||loading)return;const q=inp.trim();setInp('');setMsgs(m=>[...m,{r:'u',t:q}]);setLoading(true);
    try{
      const history=msgs.slice(1).map(m=>({role:m.r==='u'?'user':'assistant',content:m.t}));
      const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,system:'Bạn là chuyên gia tâm linh người Việt, am hiểu sâu về: Thần Số Học Pythagoras, Lịch Âm Dương Việt Nam, Phong Thủy, 12 Con Giáp, Can Chi, Ngũ Hành. Trả lời bằng tiếng Việt, thân thiện, chuyên nghiệp. Dùng emoji phù hợp. Ngắn gọn dưới 250 từ. Khi tính toán hãy giải thích từng bước.',messages:[...history,{role:'user',content:q}]})});
      const data=await r.json();const reply=data.content?.map(c=>c.text||'').join('')||'Xin lỗi, có lỗi xảy ra.';
      setMsgs(m=>[...m,{r:'a',t:reply}]);
    }catch(e){setMsgs(m=>[...m,{r:'a',t:'❌ Lỗi kết nối. Vui lòng thử lại.'}]);}
    setLoading(false);
  };
  const QUICK=['Ngày hôm nay có tốt không?','Tuổi Ngựa hợp với tuổi nào?','Hướng nhà tốt cho người tuổi Tý?','Số chủ đạo 7 có ý nghĩa gì?'];
  return(<div style={{display:'flex',flexDirection:'column',height:'calc(100dvh - 58px)'}}>
    <div style={{padding:'10px 14px 7px',borderBottom:'1px solid rgba(255,255,255,.06)',flexShrink:0,textAlign:'center',fontFamily:'Cinzel',color:'#A29BFE',fontSize:13}}>🤖 Trợ Lý Tâm Linh AI</div>
    <div style={{flex:1,overflowY:'auto',padding:'12px 14px'}}>
      {msgs.map((m,i)=>(<div key={i} style={{display:'flex',justifyContent:m.r==='u'?'flex-end':'flex-start',marginBottom:10}}>
        {m.r==='a'&&<div style={{width:26,height:26,borderRadius:'50%',background:'linear-gradient(135deg,#A29BFE,#6c5ce7)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,marginRight:7,flexShrink:0,marginTop:2}}>🔮</div>}
        <div style={{maxWidth:'83%',background:m.r==='u'?'linear-gradient(135deg,#A29BFE,#6c5ce7)':'rgba(255,255,255,.06)',borderRadius:m.r==='u'?'16px 16px 3px 16px':'16px 16px 16px 3px',padding:'10px 13px',color:'#fff',fontSize:13,lineHeight:1.75,border:m.r!=='u'?'1px solid rgba(255,255,255,.08)':'none',whiteSpace:'pre-wrap'}}>{m.t}</div>
      </div>))}
      {loading&&<div style={{display:'flex',alignItems:'center',gap:8,marginLeft:33,marginBottom:10}}><div style={{background:'rgba(255,255,255,.06)',borderRadius:'16px 16px 16px 3px',padding:'10px 14px',display:'flex',gap:4}}>{[0,1,2].map(i=><div key={i} style={{width:6,height:6,borderRadius:'50%',background:'#A29BFE',animation:`pulse 1s ${i*.2}s infinite`}}/>)}</div></div>}
      <div ref={bot}/>
    </div>
    <div style={{padding:'6px 12px 8px',borderTop:'1px solid rgba(255,255,255,.06)',flexShrink:0}}>
      <div style={{display:'flex',gap:6,overflowX:'auto',marginBottom:7,paddingBottom:2}}>
        {QUICK.map(q=><button key={q} onClick={()=>setInp(q)} style={{background:'rgba(162,155,254,.12)',border:'1px solid rgba(162,155,254,.25)',borderRadius:20,padding:'5px 11px',color:'#A29BFE',fontSize:10,cursor:'pointer',whiteSpace:'nowrap',flexShrink:0}}>{q}</button>)}
      </div>
      <div style={{display:'flex',gap:7}}>
        <input value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()} placeholder="Hỏi về số học, lịch, phong thủy..." style={{flex:1,background:'rgba(255,255,255,.06)',border:'1px solid rgba(162,155,254,.3)',borderRadius:12,padding:'11px 13px',color:'#fff',fontSize:13,outline:'none'}}/>
        <button onClick={send} disabled={loading} style={{width:44,height:44,borderRadius:12,background:'linear-gradient(135deg,#A29BFE,#6c5ce7)',border:'none',color:'#fff',fontSize:18,cursor:'pointer',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'}}>{loading?'⌛':'➤'}</button>
      </div>
    </div>
  </div>);
}

// ═══════════════════════════════════════════
//  APP SHELL
// ═══════════════════════════════════════════
const NAV=[
  {k:'home',i:'🏠',l:'Trang chủ',c:'#D4AF37'},
  {k:'lich',i:'📅',l:'Lịch',c:'#6BCB77'},
  {k:'analyze',i:'🔢',l:'Thần Số',c:'#A29BFE'},
  {k:'phongthuy',i:'🏠',l:'Phong Thủy',c:'#FDCB6E'},
  {k:'ai',i:'🤖',l:'AI',c:'#A29BFE'},
];

function App(){
  const [tab,setTab]=useState('home');
  const render=()=>{
    switch(tab){
      case 'home': return<HomeTab go={setTab}/>;
      case 'lich': return<LichTab/>;
      case 'analyze': return<AnalyzeTab/>;
      case 'compat': return<div style={{padding:'14px 14px 90px'}}><h2 style={{fontFamily:'Cinzel',color:'#FF9FF3',fontSize:16,marginBottom:16,textAlign:'center'}}>💑 Hợp Số Đôi</h2><div style={{color:'#888',textAlign:'center'}}>Sẽ cập nhật trong phiên bản tiếp theo</div></div>;
      case 'phongthuy': return<PhongThuyTab/>;
      case 'zodiac': return<ZodiacTab/>;
      case 'ai': return<AITab/>;
      default: return<HomeTab go={setTab}/>;
    }
  };
  return(
    <div style={{height:'100dvh',background:'#0a0a1a',fontFamily:"'Noto Sans',sans-serif",color:'#fff',position:'relative',maxWidth:430,margin:'0 auto',display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <Stars/>
      <div style={{position:'relative',zIndex:1,flex:1,overflowY:tab==='ai'?'hidden':'auto',overflowX:'hidden'}}>
        {render()}
      </div>
      <nav style={{position:'relative',zIndex:10,background:'rgba(10,10,26,.97)',backdropFilter:'blur(20px)',borderTop:'1px solid rgba(212,175,55,.12)',flexShrink:0,paddingBottom:'env(safe-area-inset-bottom,0px)'}}>
        <div style={{display:'flex',justifyContent:'space-around',padding:'6px 0 4px'}}>
          {NAV.map(n=>(
            <button key={n.k} onClick={()=>setTab(n.k)} style={{background:'none',border:'none',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:2,padding:'4px 6px',minWidth:60,opacity:tab===n.k?1:.4,transition:'opacity .2s'}}>
              <span style={{fontSize:19,filter:tab===n.k?`drop-shadow(0 0 5px ${n.c})`:'none'}}>{n.i}</span>
              <span style={{fontSize:9,color:tab===n.k?n.c:'#555',fontFamily:'Cinzel',letterSpacing:.3}}>{n.l}</span>
              {tab===n.k&&<div style={{width:3,height:3,borderRadius:'50%',background:n.c}}/>}
            </button>
          ))}
        </div>
      </nav>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
