  è:5,é:5,ẻ:5,ẽ:5,ẹ:5,ê:5,ế:5,ề:5,ể:5,ễ:5,ệ:5,ì:9,í:9,ỉ:9,ĩ:9,ị:9,

};
const VOWELS = new Set('aeiouàáảãạăắặằẳẵâấầẩẫậèéẻẽẹêếềểễệìíỉĩịòóỏõọôốồổỗộơớờởỡợùúủũụưứừửữựỳýỷỹỵ');
const MASTER = new Set([11,22,33]);

const reduce = n => {
  if(MASTER.has(n)||n<=0) return n||0;
  if(n<=9) return n;
  return reduce([...String(n)].reduce((a,b)=>a+parseInt(b),0));
};
const sumStr = s => [...s].reduce((a,b)=>a+(parseInt(b)||0),0);
const getLP = dob => { const d=dob.replace(/\D/g,''); return d.length>=8?reduce(sumStr(d)):null; };
const getExp = name => { const c=name.toLowerCase().replace(/\s/g,''); return reduce([...c].reduce((a,ch)=>a+(PYTH[ch]||0),0)); };
const getSoul = name => { const c=name.toLowerCase().replace(/\s/g,''); return reduce([...c].filter(ch=>VOWELS.has(ch)).reduce((a,ch)=>a+(PYTH[ch]||0),0)); };
const getPerso = name => { const c=name.toLowerCase().replace(/\s/g,''); return reduce([...c].filter(ch=>!VOWELS.has(ch)&&PYTH[ch]).reduce((a,ch)=>a+(PYTH[ch]||0),0)); };
const getAtt = dob => { const d=dob.replace(/\D/g,''); return d.length>=4?reduce(sumStr(d.slice(0,4))):null; };
const getPY = (dob,yr) => { const d=dob.replace(/\D/g,''); return d.length>=4?reduce(sumStr(d.slice(0,4)+String(yr))):null; };
const analyzeNum = s => reduce(sumStr(s.replace(/\D/g,'')));

const compat = (a,b) => {
  const C = {1:[1,3,5],2:[2,4,8],3:[1,3,5],4:[2,4,6],5:[1,3,5],6:[2,4,6],7:[2,7],8:[2,4,8],9:[3,6,9],11:[2,11],22:[4,22],33:[6,33]};
  const list = C[a]||[];
  if(list.includes(b)) return 85+Math.floor(Math.random()*15);
  const diff = Math.abs((a>10?a/11:a)-(b>10?b/11:b));
  return Math.max(42, 78-Math.round(diff*8));
};

// ==================== COMPONENTS ====================

function Stars() {
  const stars = Array.from({length:55},()=>({x:Math.random()*100,y:Math.random()*100,s:Math.random()*2+.5,d:Math.random()*4,du:Math.random()*3+2}));
  return (
    <div style={{position:'fixed',inset:0,pointerEvents:'none',zIndex:0,overflow:'hidden'}}>
      {stars.map((st,i)=>(
        <div key={i} style={{position:'absolute',left:`${st.x}%`,top:`${st.y}%`,width:st.s,height:st.s,borderRadius:'50%',background:'rgba(255,255,255,0.9)',animation:`twinkle ${st.du}s ${st.d}s infinite`}}/>
      ))}
      <div style={{position:'absolute',width:'60vw',height:'60vw',maxWidth:400,maxHeight:400,borderRadius:'50%',background:'radial-gradient(circle,rgba(212,175,55,.07) 0%,transparent 70%)',top:'5%',left:'10%',animation:'orb 18s infinite ease-in-out'}}/>
      <div style={{position:'absolute',width:'50vw',height:'50vw',maxWidth:320,maxHeight:320,borderRadius:'50%',background:'radial-gradient(circle,rgba(162,155,254,.06) 0%,transparent 70%)',bottom:'15%',right:'5%',animation:'orb 24s infinite ease-in-out reverse'}}/>
    </div>
  );
}

function NumBadge({num}) {

}

function Card({color,children,style={}}) {
  return <div style={{background:`linear-gradient(135deg,${color||'#D4AF37'}18,${color||'#D4AF37'}05)`,border:`1px solid ${color||'#D4AF37'}33`,borderRadius:16,padding:16,...style}}>{children}</div>;
}

function Btn({label,onClick,color='#D4AF37',full=false,style={}}) {
  return <button onClick={onClick} style={{width:full?'100%':undefined,background:`linear-gradient(135deg,${color},${color}cc)`,border:'none',borderRadius:12,padding:'13px 18px',color:'#000',fontFamily:'Cinzel',fontSize:13,fontWeight:700,cursor:'pointer',letterSpacing:.5,...style}}>{label}</button>;
}

function Input({label,value,onChange,placeholder,type='text'}) {
  return (
    <div style={{marginBottom:12}}>
      {label&&<div style={{color:'#888',fontSize:11,marginBottom:5,letterSpacing:.5}}>{label}</div>}
      <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}

    </div>
  );
}

function DateTab() {
  const [dob,setDob]=useState('');
  const [mo,setMo]=useState(String(new Date().getMonth()+1));
  const [yr,setYr]=useState('2026');
  const [res,setRes]=useState([]);

  const find=()=>{
    if(!dob) return;
    const d=dob.replace(/\//g,'');
    const lp=getLP(d); if(!lp) return;
    const m=parseInt(mo),y=parseInt(yr);
    const days=new Date(y,m,0).getDate();
    const good=[];
    for(let i=1;i<=days;i++){
      const dn=reduce(i>9?[...String(i)].reduce((a,b)=>a+parseInt(b),0):i);
      const sc=compat(lp,dn);
      if(sc>=68) good.push({day:i,dn,sc});
    }
    setRes(good.sort((a,b)=>b.sc-a.sc).slice(0,10));
  };

  const sel={width:'100%',background:'rgba(20,20,40,.9)',border:'1px solid rgba(253,203,110,.3)',borderRadius:10,padding:'11px',color:'#fff',fontSize:13,outline:'none'};

  return (

          <div>
            <div style={{color:'#888',fontSize:11,marginBottom:5}}>THÁNG</div>
            <select value={mo} onChange={e=>setMo(e.target.value)} style={sel}>
              {Array.from({length:12},(_,i)=><option key={i+1} value={i+1}>Tháng {i+1}</option>)}
            </select>
          </div>
          <div>
            <div style={{color:'#888',fontSize:11,marginBottom:5}}>NĂM</div>
            <select value={yr} onChange={e=>setYr(e.target.value)} style={sel}>
              {['2025','2026','2027'].map(y=><option key={y} value={y}>{y}</option>)}
            </select>
          </div>
        </div>
        <Btn label="🔍 TÌM NGÀY TỐT" onClick={find} color="#FDCB6E" full/>
      </div>
      {res.length>0&&(
        <div style={{animation:'fadeInUp .4s ease'}}>
          <div style={{color:'#FDCB6E',fontFamily:'Cinzel',fontSize:11,marginBottom:12,textAlign:'center'}}>Top {res.length} ngày tốt nhất — Tháng {mo}/{yr}</div>
          {res.map((r,i)=>{
            const d=N[r.dn]||N[1];
            return (
              <div key={i} style={{display:'flex',alignItems:'center',gap:10,background:`linear-gradient(135deg,${d.c}15,${d.c}05)`,border:`1px solid ${d.c}30`,borderRadius:13,padding:'11px 13px',marginBottom:8}}>
                <div style={{width:42,height:42,borderRadius:11,background:`${d.c}20`,border:`1px solid ${d.c}44`,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                  <div style={{fontFamily:'Cinzel',color:d.c,fontSize:17,fontWeight:900,lineHeight:1}}>{r.day}</div>
                  <div style={{color:'#666',fontSize:8}}>/{mo}</div>
                </div>
                <div style={{flex:1}}>
                  <div style={{display:'flex',alignItems:'center',gap:6}}>
                    <span style={{fontFamily:'Cinzel',color:'#ddd',fontSize:13}}>Ngày {r.day}/{mo}/{yr}</span>
                    {i===0&&<span style={{background:'#D4AF37',color:'#000',fontSize:9,padding:'1px 6px',borderRadius:4,fontFamily:'Cinzel'}}>TỐT NHẤT</span>}
                  </div>
                  <div style={{color:'#888',fontSize:11,marginTop:2}}>Số {r.dn} • {d.n} {d.e}</div>
                </div>
                <div style={{textAlign:'right',flexShrink:0}}>
                  <div style={{fontFamily:'Cinzel',color:d.c,fontSize:16,fontWeight:700}}>{r.sc}%</div>
                  <div style={{color:'#666',fontSize:9}}>hợp</div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function AITab() {
  const [msgs,setMsgs]=useState([{r:'a',t:'✨ Xin chào! Tôi là chuyên gia Thần Số Học AI. Hãy hỏi tôi bất cứ điều gì về số học, vận mệnh, hay ý nghĩa các con số trong cuộc sống của bạn!'}]);
  const [inp,setInp]=useState('');
  const [loading,setLoading]=useState(false);
  const bot=useRef(null);

  useEffect(()=>{bot.current?.scrollIntoView({behavior:'smooth'})},[msgs,loading]);

  const send=async()=>{
    if(!inp.trim()||loading) return;
    const q=inp.trim(); setInp('');
    setMsgs(m=>[...m,{r:'u',t:q}]);
    setLoading(true);
    try{
      const history=msgs.slice(1).map(m=>({role:m.r==='u'?'user':'assistant',content:m.t}));
      const r=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',
          max_tokens:800,
          system:'Bạn là chuyên gia Thần Số Học (Numerology) người Việt, am hiểu sâu hệ thống Pythagoras, phong thủy số học và văn hóa tâm linh Việt Nam. Trả lời bằng tiếng Việt, thân thiện, chuyên nghiệp. Dùng emoji phù hợp. Ngắn gọn dưới 250 từ. Khi tính số hãy giải thích từng bước.',
          messages:[...history,{role:'user',content:q}]
        })
      });
      const data=await r.json();
      const reply=data.content?.map(c=>c.text||'').join('')||'Xin lỗi, có lỗi xảy ra.';
      setMsgs(m=>[...m,{r:'a',t:reply}]);
    }catch(e){
      setMsgs(m=>[...m,{r:'a',t:'❌ Lỗi kết nối. Vui lòng thử lại.'}]);
    }
    setLoading(false);
  };

  const QUICK=['Số chủ đạo của tôi là 7 có ý nghĩa gì?','Số điện thoại 0901234567 tốt không?','Năm 2026 vận hạn số 5 thế nào?','Tên nào hợp với số chủ đạo 8?'];

  return (
    <div style={{display:'flex',flexDirection:'column',height:'calc(100dvh - 58px)'}}>
      <div style={{padding:'12px 16px 8px',borderBottom:'1px solid rgba(255,255,255,.06)',flexShrink:0}}>
        <div style={{textAlign:'center',fontFamily:'Cinzel',color:'#A29BFE',fontSize:14}}>🤖 Trợ Lý Thần Số AI</div>
      </div>
      <div style={{flex:1,overflowY:'auto',padding:'12px 14px'}}>
        {msgs.map((m,i)=>(
          <div key={i} style={{display:'flex',justifyContent:m.r==='u'?'flex-end':'flex-start',marginBottom:10}}>
            {m.r==='a'&&<div style={{width:26,height:26,borderRadius:'50%',background:'linear-gradient(135deg,#A29BFE,#6c5ce7)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,marginRight:7,flexShrink:0,marginTop:2}}>🔮</div>}
            <div style={{maxWidth:'83%',background:m.r==='u'?'linear-gradient(135deg,#A29BFE,#6c5ce7)':'rgba(255,255,255,.06)',borderRadius:m.r==='u'?'16px 16px 3px 16px':'16px 16px 16px 3px',padding:'10px 13px',color:'#fff',fontSize:13,lineHeight:1.75,border:m.r!=='u'?'1px solid rgba(255,255,255,.08)':'none',whiteSpace:'pre-wrap'}}>
              {m.t}
            </div>
          </div>
        ))}
        {loading&&(
          <div style={{display:'flex',alignItems:'center',gap:8,marginLeft:33,marginBottom:10}}>
            <div style={{background:'rgba(255,255,255,.06)',borderRadius:'16px 16px 16px 3px',padding:'10px 14px',display:'flex',gap:4}}>
              {[0,1,2].map(i=><div key={i} style={{width:6,height:6,borderRadius:'50%',background:'#A29BFE',animation:`pulse 1s ${i*0.2}s infinite`}}/>)}
            </div>
          </div>
        )}
        <div ref={bot}/>
      </div>
      <div style={{padding:'6px 12px 8px',borderTop:'1px solid rgba(255,255,255,.06)',flexShrink:0}}>
        <div style={{display:'flex',gap:6,overflowX:'auto',marginBottom:7,paddingBottom:2}}>
          {QUICK.map(q=>(
            <button key={q} onClick={()=>setInp(q)} style={{background:'rgba(162,155,254,.12)',border:'1px solid rgba(162,155,254,.25)',borderRadius:20,padding:'5px 11px',color:'#A29BFE',fontSize:10,cursor:'pointer',whiteSpace:'nowrap',flexShrink:0}}>
              {q}
            </button>
          ))}
        </div>
        <div style={{display:'flex',gap:7}}>
          <input value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()} placeholder="Hỏi về thần số học..."
            style={{flex:1,background:'rgba(255,255,255,.06)',border:'1px solid rgba(162,155,254,.3)',borderRadius:12,padding:'11px 13px',color:'#fff',fontSize:13,outline:'none'}}/>
          <button onClick={send} disabled={loading} style={{width:44,height:44,borderRadius:12,background:'linear-gradient(135deg,#A29BFE,#6c5ce7)',border:'none',color:'#fff',fontSize:18,cursor:'pointer',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
            {loading?'⌛':'➤'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ==================== APP SHELL ====================
function App() {
  const [tab,setTab]=useState('home');
  const NAV=[
    {k:'home',i:'🏠',l:'Trang chủ',c:'#D4AF37'},
    {k:'analyze',i:'🔢',l:'Phân tích',c:'#A29BFE'},
    {k:'compat',i:'💑',l:'Hợp số',c:'#FF9FF3'},
    {k:'special',i:'📱',l:'Số ĐB',c:'#4D96FF'},
    {k:'ai',i:'🤖',l:'AI Chat',c:'#A29BFE'},
  ];
  const EXTRA=['name','date'];

  const renderTab=()=>{
    switch(tab){
      case 'home': return <HomeTab go={setTab}/>;
      case 'analyze': return <AnalyzeTab/>;
      case 'compat': return <CompatTab/>;
      case 'special': return <SpecialTab/>;
      case 'name': return <NameTab/>;
      case 'date': return <DateTab/>;
      case 'ai': return <AITab/>;
      default: return <HomeTab go={setTab}/>;
    }
  };

  return (
    <div style={{height:'100dvh',background:'#0a0a1a',fontFamily:"'Noto Sans',sans-serif",color:'#fff',position:'relative',maxWidth:430,margin:'0 auto',display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <Stars/>
      <div style={{position:'relative',zIndex:1,flex:1,overflowY:tab==='ai'?'hidden':'auto',overflowX:'hidden'}}>
        {renderTab()}
      </div>
      <nav style={{position:'relative',zIndex:10,background:'rgba(10,10,26,.97)',backdropFilter:'blur(20px)',borderTop:'1px solid rgba(212,175,55,.12)',flexShrink:0,paddingBottom:'env(safe-area-inset-bottom,0px)'}}>
        <div style={{display:'flex',justifyContent:'space-around',padding:'6px 0 4px'}}>
          {NAV.map(n=>(
            <button key={n.k} onClick={()=>setTab(n.k)} style={{background:'none',border:'none',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:2,padding:'4px 6px',minWidth:54,opacity:tab===n.k?1:.45,transition:'opacity .2s'}}>
              <span style={{fontSize:19,filter:tab===n.k?`drop-shadow(0 0 5px ${n.c})`:'none',transition:'filter .2s'}}>{n.i}</span>
              <span style={{fontSize:9,color:tab===n.k?n.c:'#666',fontFamily:'Cinzel',letterSpacing:.3}}>{n.l}</span>
              {tab===n.k&&<div style={{width:3,height:3,borderRadius:'50%',background:n.c}}/>}
            </button>
          ))}
        </div>
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
